# Test file with intentionally wrong key ordering
# Run: python k8s_yaml_fmt.py --diff test/unformatted.yaml
kind: Deployment
metadata:
  annotations:
    description: "Test deployment"
  labels:
    app: nginx
  name: nginx-deployment
  namespace: default
apiVersion: apps/v1
spec:
  template:
    spec:
      containers:
      - resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
          requests:
            cpu: "100m"
            memory: "64Mi"
        volumeMounts:
        - readOnly: true
          name: config
          mountPath: /etc/nginx/conf.d
        image: nginx:1.25
        name: nginx
        ports:
        - protocol: TCP
          containerPort: 80
          name: http
        env:
        - valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOG_LEVEL
          name: LOG_LEVEL
        livenessProbe:
          periodSeconds: 10
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
      volumes:
      - name: config
        configMap:
          name: nginx-config
    metadata:
      labels:
        app: nginx
  selector:
    matchLabels:
      app: nginx
  replicas: 3
---
kind: Service
apiVersion: v1
metadata:
  name: nginx-service
  namespace: default
spec:
  ports:
  - targetPort: 80
    port: 80
    name: http
    protocol: TCP
  type: ClusterIP
  selector:
    app: nginx
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - http:
      paths:
      - backend:
          service:
            name: nginx-service
            port:
              number: 80
        pathType: Prefix
        path: /
    host: example.com
  ingressClassName: nginx
  tls:
  - secretName: tls-secret
    hosts:
    - example.com
